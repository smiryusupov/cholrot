name: tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        python-version:
          - "3.12"
          - "3.13"
          - "3.14"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade packaging tools
        run: |
          python -m pip install --upgrade pip setuptools wheel

      - name: Install package with tests
        run: |
          python -m pip install -e ".[test]"

      - name: Show backend
        run: |
          python -c "import cholrot; print('cholrot backend =', cholrot.backend())"

      - name: Run tests with compiled backend
        run: |
          pytest -ra

      - name: Run tests with pure Python fallback
        env:
          CHOLROT_PURE_PYTHON: "1"
        run: |
          pytest -ra