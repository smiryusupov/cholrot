name: wheels

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Build sdist
        run: |
          python -m build --sdist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  build-wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-13
          - macos-14
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.1.4
        env:
          CIBW_BUILD: "cp312-* cp313-* cp314-*"
          CIBW_SKIP: "*-musllinux_* cp313t-* cp314t-* pp*"
          CIBW_TEST_REQUIRES: "pytest"
          CIBW_TEST_COMMAND: "python -c \"import cholrot; print('backend=', cholrot.backend())\" && pytest {project}/tests"

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  check:
    name: Check distributions
    needs:
      - build-sdist
      - build-wheels
    runs-on: ubuntu-latest

    steps:
      - name: Download all distributions
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten distributions
        run: |
          mkdir -p dist
          find artifacts -type f \( -name "*.whl" -o -name "*.tar.gz" \) -exec cp {} dist/ \;
          ls -lh dist

      - name: Check metadata
        run: |
          python -m pip install --upgrade pip
          python -m pip install twine
          python -m twine check dist/*

      - name: Upload checked distributions
        uses: actions/upload-artifact@v4
        with:
          name: checked-distributions
          path: dist/*

  publish:
    name: Publish to PyPI
    needs: check
    runs-on: ubuntu-latest

    if: startsWith(github.ref, 'refs/tags/v')

    environment:
      name: pypi

    permissions:
      id-token: write

    steps:
      - name: Download checked distributions
        uses: actions/download-artifact@v4
        with:
          name: checked-distributions
          path: dist

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1